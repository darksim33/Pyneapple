[Fitting]
fitter = "segmented"

[Fitting.model_step1]
type = "monoexp"

[Fitting.model_step2]
type = "biexp"
fit_s0 = false

[Fitting.solver_step1]
type     = "curvefit"
max_iter = 250
tol      = 1e-8

[Fitting.solver_step1.p0]
S0 = 1000.0
D  = 0.001

[Fitting.solver_step1.bounds]
S0 = [1.0, 5000.0]
D  = [1e-5, 0.1]

[Fitting.solver_step2]
type     = "curvefit"
max_iter = 500
tol      = 1e-8

[Fitting.solver_step2.p0]
f1  = 0.2
D1  = 0.001
D2  = 0.02

[Fitting.solver_step2.bounds]
f1  = [0.01, 0.99]
D1  = [1e-5, 0.003]
D2  = [0.003, 0.3]

[Fitting.segmented]
step1_bvalue_range = [200, null]
fixed_from_step1   = ["D"]
param_mapping      = {"D": "D2"}
