# IDEAL bi-exponential (IVIM) fitting configuration
#
# Usage:
#   pyneapple-ideal \
#       --image  dwi.nii.gz \
#       --bval   dwi.bval   \
#       --config ideal_biexp.toml \
#       --seg    mask.nii.gz
#
# IDEAL iteratively refines the parameter maps on an increasing-resolution
# grid defined by the dim_steps array.  Adjust dim_steps to match the
# spatial dimensions of your image (last row = full image size).

[Fitting]
fitter = "ideal"

[Fitting.model]
type   = "biexp"
fit_s0 = false
fit_t1 = false

[Fitting.solver]
type     = "curvefit"
max_iter = 250
tol      = 1e-8

[Fitting.solver.p0]
S0      = 1000.0
f1      = 0.2
D2      = 0.02
D1      = 0.001

[Fitting.solver.bounds]
S0      = [1.0,   5000.0]
f1      = [0.01,  0.99]
D2      = [0.003, 0.3]
D1      = [1e-5,  0.003]

# ── IDEAL-specific parameters ───────────────────────────────────────────────
# dim_steps: 2-D array [n_steps × ideal_dims].  Each row is one IDEAL step,
#            specifying the (x, y) resolution for that step.  The last row must
#            match the image spatial dimensions.  Adjust to your data.
# step_tol : tolerance per model parameter – used to scale the parameter bounds
#            at each resolution level.  Keys must match the model param_names.

[Fitting.ideal]
dim_steps              = [[16, 16], [32, 32], [64, 64], [128, 128]]
ideal_dims             = 2
segmentation_threshold = 0.2
interpolation_method   = "cubic"

[Fitting.ideal.step_tol]
S0 = 0.5
f1 = 0.2
D2 = 0.2
D1 = 0.2
