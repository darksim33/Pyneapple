# Segmentation-wise bi-exponential (IVIM) fitting configuration
#
# Usage:
#   pyneapple-segmented \
#       --image  dwi.nii.gz \
#       --bval   dwi.bval   \
#       --config segmentationwise_biexp.toml \
#       --seg    mask.nii.gz
#
# Each unique non-zero label in the segmentation mask is fitted
# independently using the mean signal across that ROI.

[Fitting]
fitter = "segmentationwise"

[Fitting.model]
type       = "biexp"
fit_s0     = true
fit_reduce = true
fit_t1     = false

[Fitting.solver]
type     = "curvefit"
max_iter = 250
tol      = 1e-8

[Fitting.solver.p0]
S0      = 1000.0
f1      = 0.2
D2      = 0.02
D1      = 0.001

[Fitting.solver.bounds]
S0      = [1.0,   5000.0]
f1      = [0.01,  0.99]
D2      = [0.003, 0.3]
D1      = [1e-5,  0.003]
